<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureAccess — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070f; --surface:#0e0e1c; --border:#1c1c35;
  --accent:#6c63ff; --text:#e8e8f0; --muted:#5a5a7a;
  --success:#00d48a; --error:#ff4d6d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  min-height:100vh; background:var(--bg); font-family:'DM Sans',sans-serif;
  color:var(--text); display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative;
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(108,99,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,0.04) 1px,transparent 1px);
  background-size:44px 44px;
}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;}
.orb-a{width:400px;height:400px;background:radial-gradient(circle,rgba(108,99,255,0.15),transparent 70%);top:-140px;left:-140px;}
.orb-b{width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,138,0.1),transparent 70%);bottom:-100px;right:-100px;}

.wrap{
  position:relative;z-index:10;
  width:100%;max-width:400px;padding:16px;
  animation:wrapIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes wrapIn{from{opacity:0;transform:translateY(32px) scale(0.96);}to{opacity:1;transform:none;}}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:28px;padding:48px 36px;
  text-align:center;
  box-shadow:0 0 80px rgba(108,99,255,0.08),0 32px 64px rgba(0,0,0,0.6);
}

.avatar{
  width:84px;height:84px;
  background:linear-gradient(135deg,var(--accent),#ff6584);
  border-radius:50%;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:40px;
  box-shadow:0 0 40px rgba(108,99,255,0.35);
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{box-shadow:0 0 40px rgba(108,99,255,0.35);}50%{box-shadow:0 0 60px rgba(108,99,255,0.55);}}

.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:20px;
  background:rgba(0,212,138,0.1);border:1px solid rgba(0,212,138,0.25);
  font-size:12px;color:var(--success);font-weight:700;letter-spacing:0.5px;
  margin-bottom:20px;
}
.dot{width:7px;height:7px;background:var(--success);border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.6px;margin-bottom:6px;}
.name-highlight{color:var(--accent);}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:24px 0;}
.info-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:14px;padding:16px 14px;text-align:left;
}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:600;}
.info-value{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;word-break:break-all;}

.btn-logout{
  width:100%;padding:14px;
  background:rgba(255,255,255,0.03);border:1.5px solid var(--border);
  border-radius:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all 0.2s;
  text-decoration:none;display:block;margin-top:6px;
}
.btn-logout:hover{border-color:var(--error);color:var(--error);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>

<div class="wrap">
  <div class="card">
    <div class="avatar">👤</div>
    <div class="badge"><div class="dot"></div> Authenticated</div>

    <h1>Welcome, <span class="name-highlight" id="displayName">User</span>!</h1>
    <p class="sub">Identity verified via biometrics ✅</p>

    <div class="grid">
      <div class="info-card">
        <div class="info-label">User ID</div>
        <div class="info-value" id="displayId">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Auth Method</div>
        <div class="info-value">🔐 Biometric</div>
      </div>
      <div class="info-card">
        <div class="info-label">Login Time</div>
        <div class="info-value" id="loginTime">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Status</div>
        <div class="info-value" style="color:var(--success)">✅ Active</div>
      </div>
    </div>

    <a href="login.html" class="btn-logout">← Logout</a>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
document.getElementById('displayName').textContent = decodeURIComponent(p.get('user') || 'User');
document.getElementById('displayId').textContent = decodeURIComponent(p.get('id') || '—');
document.getElementById('loginTime').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
